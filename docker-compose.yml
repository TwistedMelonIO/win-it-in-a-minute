services:
  win-it-in-a-minute:
    build: .
    container_name: win-it-in-a-minute
    ports:
      - "0.0.0.0:4000:3000"
      - "0.0.0.0:3001:3001/udp"
    environment:
      - NODE_ENV=production
      - LICENSE_KEY=${LICENSE_KEY:-}
      - HOST_HARDWARE_ID=${HOST_HARDWARE_ID:-}
    volumes:
      - wiiam-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  wiiam-data:
